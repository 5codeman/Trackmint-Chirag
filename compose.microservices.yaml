services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: trackmint_microservices
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - trackmint-ms-db:/var/lib/postgresql/data
      - ./services/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trackmint_microservices"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/TrackMint.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ServiceUrls__AuthService: http://auth-service:8080
      ServiceUrls__FinanceService: http://finance-service:8080
      ServiceUrls__InsightsService: http://insights-service:8080
      ServiceUrls__NotificationService: http://notification-service:8080
    depends_on:
      - auth-service
      - finance-service
      - insights-service
      - notification-service
    ports:
      - "8090:8080"

  auth-service:
    build:
      context: .
      dockerfile: services/TrackMint.AuthService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=auth_db;Username=postgres;Password=postgres
      Jwt__Issuer: TrackMint
      Jwt__Audience: TrackMint.Client
      Jwt__SigningKey: trackmint-local-development-signing-key-change-before-production
      Jwt__AccessTokenMinutes: 30
      Jwt__RefreshTokenDays: 7
      Jwt__PasswordResetMinutes: 15
      RabbitMq__Host: rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5101:8080"

  finance-service:
    build:
      context: .
      dockerfile: services/TrackMint.FinanceService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=finance_db;Username=postgres;Password=postgres
      Jwt__Issuer: TrackMint
      Jwt__Audience: TrackMint.Client
      Jwt__SigningKey: trackmint-local-development-signing-key-change-before-production
      Features__EnableRecurringWorker: "true"
      RabbitMq__Host: rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5102:8080"

  insights-service:
    build:
      context: .
      dockerfile: services/TrackMint.InsightsService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=finance_db;Username=postgres;Password=postgres
      Jwt__Issuer: TrackMint
      Jwt__Audience: TrackMint.Client
      Jwt__SigningKey: trackmint-local-development-signing-key-change-before-production
      Features__EnableRecurringWorker: "false"
      RabbitMq__Host: rabbitmq
      FinanceService__BaseUrl: http://finance-service:8080
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      finance-service:
        condition: service_started
    ports:
      - "5103:8080"

  notification-service:
    build:
      context: .
      dockerfile: services/TrackMint.NotificationService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=notification_db;Username=postgres;Password=postgres
      Jwt__Issuer: TrackMint
      Jwt__Audience: TrackMint.Client
      Jwt__SigningKey: trackmint-local-development-signing-key-change-before-production
      RabbitMq__Host: rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5104:8080"

volumes:
  trackmint-ms-db:
